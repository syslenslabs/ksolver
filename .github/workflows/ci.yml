name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  ORTOOLS_VERSION: "9.15.6755"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install OR-Tools
        run: |
          curl -fsSL https://github.com/google/or-tools/releases/download/v${ORTOOLS_VERSION}/or-tools_amd64_debian-13_cpp_v${ORTOOLS_VERSION}.tar.gz \
            | sudo tar xz -C /usr/local --strip-components=1
          sudo ldconfig

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --features rust-cp-sat -- -D warnings

      - name: Run tests
        run: cargo test --features rust-cp-sat
