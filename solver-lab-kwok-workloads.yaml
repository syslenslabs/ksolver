apiVersion: v1
kind: Namespace
metadata:
  name: production
---
# Large API fleet spread across general pool
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: production
spec:
  replicas: 8
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      tolerations:
        - key: kwok.x-k8s.io/node
          operator: Exists
      nodeSelector:
        eks.amazonaws.com/nodegroup: general
      containers:
        - name: api
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: production
spec:
  replicas: 4
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      tolerations:
        - key: kwok.x-k8s.io/node
          operator: Exists
      nodeSelector:
        eks.amazonaws.com/nodegroup: general
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: auth-service
                topologyKey: kubernetes.io/hostname
      containers:
        - name: auth
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
---
